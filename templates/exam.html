<!DOCTYPE html>
<html lang="en">
<head>
    <title>Online Exam</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap">
    <style>
        /* Professional CSS with gradients */
        :root {
            --primary-gradient: linear-gradient(135deg, #6e8efb, #a777e3);
            --danger-gradient: linear-gradient(135deg, #ff5858, #f857a6);
            --border-radius: 8px;
            --box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        h2 {
            text-align: center;
            background: var(--primary-gradient);
            color: white;
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 25px;
            box-shadow: var(--box-shadow);
            position: relative;
            overflow: hidden;
        }
        
        h2::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            transform: rotate(30deg);
        }
        
        #cheating-alert {
            background: var(--danger-gradient);
            color: white;
            padding: 15px;
            border-radius: var(--border-radius);
            text-align: center;
            font-weight: 500;
            margin-bottom: 20px;
            box-shadow: var(--box-shadow);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        
        #exam-form {
            background: white;
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }
        
        #exam-form p {
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        input[type="radio"] {
            margin-right: 10px;
        }
        
        input[type="radio"] + br {
            margin-bottom: 8px;
        }
        
        button[type="submit"] {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: var(--box-shadow);
        }
        
        button[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }
        
        #timer {
            background: white;
            padding: 12px 20px;
            border-radius: var(--border-radius);
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
            box-shadow: var(--box-shadow);
            position: relative;
            overflow: hidden;
        }
        
        #timer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-gradient);
        }
        
        /* Responsive design */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
            
            h2 {
                font-size: 1.5rem;
                padding: 15px;
            }
            
            #exam-form {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <h2>Online Exam</h2>
    
    <div id="cheating-alert" style="color: red; display: none;">
        ❌ Cheating detected! Exam terminated.
    </div>

    <form id="exam-form" action="/submit_exam" method="POST">
        {% for question in questions %}
            <p>{{ question.question }}</p>
            <input type="radio" name="q{{ question.id }}" value="{{ question.option1 }}"> {{ question.option1 }}<br>
            <input type="radio" name="q{{ question.id }}" value="{{ question.option2 }}"> {{ question.option2 }}<br>
            <input type="radio" name="q{{ question.id }}" value="{{ question.option3 }}"> {{ question.option3 }}<br>
            <input type="radio" name="q{{ question.id }}" value="{{ question.option4 }}"> {{ question.option4 }}<br>
        {% endfor %}
        <button type="submit">Submit</button>
    </form>

    <p id="timer">Time Left: 160s</p>

    <script>
        var timeLeft = 160;
        var timerInterval = setInterval(function() {
            timeLeft--;
            $("#timer").text("Time Left: " + timeLeft + "s");
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                $("#exam-form").submit(); // Auto-submit
            }
        }, 1000);

        setInterval(function() {
            $.get("/check_cheating", function(data) {
                if (data.cheating) {
                    $("#cheating-alert").show();
                    setTimeout(function() { window.location.href = "/cheating_detected"; }, 2000);
                }
            });
        }, 2000);
    </script>
</body>
</html>
